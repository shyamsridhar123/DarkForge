{{/*
  image-prewarm-controller-rbac.yaml — RBAC for the image pre-warm DaemonSet.
  Plan ref: RALPLAN-DR v0.3 FINAL, Task 2.7

  WHY cluster-scope is necessary here (documented per plan requirement):
  The pre-warm initContainer must remove the `pre-warm=pending:NoSchedule` taint
  from the node it runs on. Node taints are a node-scoped (cluster-level) resource.
  There is no namespace-scoped equivalent. This is the minimal cluster-scope
  permission the pre-warm component requires: `patch nodes` only.

  This ClusterRole does NOT grant Pod, Secret, ConfigMap, or any other resource access.
*/}}
{{- if .Values.imagePreWarm.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opensandbox.prewarm.serviceAccountName" . }}
  namespace: {{ include "opensandbox.systemNamespace" . }}
  labels:
    {{- include "opensandbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prewarm
---
# ClusterRole — patch nodes/taints only.
# This is the minimum permission needed to remove a taint from the current node.
# No other cluster-scoped permissions are granted.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opensandbox-prewarm-taint-remover
  labels:
    {{- include "opensandbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prewarm
rules:
  # Read node taints (to build the filtered taint list).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Patch the node to remove the pre-warm taint.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opensandbox-prewarm-taint-remover
  labels:
    {{- include "opensandbox.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prewarm
subjects:
  - kind: ServiceAccount
    name: {{ include "opensandbox.prewarm.serviceAccountName" . }}
    namespace: {{ include "opensandbox.systemNamespace" . }}
roleRef:
  kind: ClusterRole
  name: opensandbox-prewarm-taint-remover
  apiGroup: rbac.authorization.k8s.io
{{- end }}
